<!DOCTYPE html>
<html>
<head>
  <title>Blog - Tarandeep Singh Rajput</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .card a {
      text-decoration: none;
      color: black;
      font-size: 20px;
      font-weight: bold;
    }

    .card p {
      margin-top: 10px;
      color: #555;
    }

  </style>

</head>

<body>

<div class="container">

<h1>Blog</h1>

<div class="grid">

  <div class="card">
    <img src="https://via.placeholder.com/600x300" alt="Blog Image">
    <div class="card-content">
      <a href="blog1.html">My First Blog</a>
      <p>Introduction and first article.</p>
    </div>
  </div>

</div>

</div>

</body>
</html>
