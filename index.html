<!DOCTYPE html>
<html>
<head>
  <title>Tarandeep Singh Rajput</title>

  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #111;
  }

  section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease;
  }

  section.show {
    opacity: 1;
    transform: translateY(0);
  }

  .container {
    max-width: 900px;
    text-align: center;
  }

  h1 {
    font-size: 42px;
    margin-bottom: 10px;
  }

  h2 {
    font-size: 28px;
    margin-bottom: 15px;
  }

  p {
    font-size: 16px;
    line-height: 1.7;
  }

  a {
    text-decoration: none;
    color: black;
    border-bottom: 1px solid black;
    padding-bottom: 2px;
  }

  .btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    border: 1px solid black;
  }
</style>

</head>

<body>

<div class="container">

  <h1>Tarandeep Singh Rajput</h1>
<p><a href="resume.html">View My Resume</a></p>
  <p>Welcome to my personal website, blog, and portfolio.</p>

  <h2>About Me</h2>
  <p>I will add my resume and work here.</p>

  <h2>Blog</h2>
  <p>My articles will be published here.</p>

</div>
<script>
  const sections = document.querySelectorAll("section");

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add("show");
      }
    });
  });

  sections.forEach((section) => {
    observer.observe(section);
  });
</script>
</body>
</html>
